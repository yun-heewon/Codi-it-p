name: CD
 
on:
  push:
    branches: [main]
 
# 동시 배포 방지
concurrency:
  group: cd-production
  cancel-in-progress: false
 
jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          # npm install + tsc 는 Swap I/O 때문에 시간이 걸림
          command_timeout: 10m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
 
            # ── 0. 시스템 리소스 확인 ────────────────────────────────
            echo "▶ 시스템 리소스 확인"
            free -h
 
            if ! swapon --show | grep -q .; then
              echo "⚠️  Swap 비활성화 상태 — npm install/build 중 OOM 위험"
              echo "    sudo fallocate -l 2G /swapfile && sudo chmod 600 /swapfile"
              echo "    sudo mkswap /swapfile && sudo swapon /swapfile"
            else
              echo "✅ Swap: $(swapon --show --noheadings | awk '{print $3}')"
            fi
 
            # ── 1. 최신 코드 pull ────────────────────────────────────
            echo "▶ git pull"
            git pull origin main
 
            # ── 2. 의존성 설치 (Swap 활용 구간) ─────────────────────
            # package-lock.json 기준으로 정확히 설치 (npm install 보다 안전)
            echo "▶ npm ci (node_modules 갱신)"
            npm ci --prefer-offline 2>&1
 
            # ── 3. TypeScript 빌드 (Swap 활용 구간) ──────────────────
            echo "▶ npm run build (tsc 컴파일)"
            npm run build 2>&1
 
            # ── 4. 기존 컨테이너 교체 ───────────────────────────────
            echo "▶ 기존 컨테이너 중지 및 제거"
            sudo docker stop codi-app 2>/dev/null || true
            sudo docker rm   codi-app 2>/dev/null || true
 
            # ── 5. 새 컨테이너 실행 (기존 방식 유지) ─────────────────
            # -v $(pwd):/app : 빌드된 dist/ 와 node_modules/ 를 컨테이너에 마운트
            # .env 파일도 마운트 경로에 포함되어 자동으로 로드됨
            echo "▶ 컨테이너 시작"
            sudo docker run -d \
              --name codi-app \
              --restart unless-stopped \
              --memory="700m" \
              --memory-swap="-1" \
              --memory-swappiness=10 \
              -p 3000:3000 \
              -v $(pwd):/app \
              -w /app \
              node:22-alpine \
              node dist/main.js
 
            # ── 6. 헬스체크 (최대 30초) ──────────────────────────────
            echo "▶ 헬스체크"
            for i in $(seq 1 6); do
              sleep 5
              if sudo docker ps --filter "name=codi-app" --filter "status=running" \
                   | grep -q codi-app; then
                echo "✅ 배포 성공 (${i}번째 확인)"
                break
              fi
              echo "  대기 중... (${i}/6)"
              if [ "$i" = "6" ]; then
                echo "❌ 컨테이너 실행 실패 — 로그:"
                sudo docker logs codi-app --tail 30
                exit 1
              fi
            done
 
            echo "▶ 배포 후 리소스"
            free -h