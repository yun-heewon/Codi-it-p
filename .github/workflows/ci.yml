name: CI
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
 
# 같은 브랜치에 연속 push 시 이전 실행 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
 
jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Lint + Type-check + Build
  # ────────────────────────────────────────────────────────────
  quality:
    name: Code Quality (Lint & Build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      # Prisma 7 + adapter-pg: URL 없이도 generate 가능
      - name: Generate Prisma Client
        run: npx prisma generate
 
      # --fix 없이 검사만 수행 
      - name: Lint check
        run: npx eslint "{src,apps,libs,test}/**/*.ts"
 
      # tsc --noEmit: 타입 오류만 검출, 파일 생성 안 함
      - name: TypeScript type check
        run: npx tsc --noEmit
 
      # 실제 컴파일이 성공하는지 확인
      - name: Build
        run: npm run build
 
  # ────────────────────────────────────────────────────────────
